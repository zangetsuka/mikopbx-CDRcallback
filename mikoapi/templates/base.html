<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MikoPBX Service{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      .topbar-search { position: relative; }
      .search-results {
        position: absolute; top: calc(100% + 8px); left: 0; right: 0;
        background: var(--surface, #161B22); border: 1px solid var(--border, #2a3340);
        border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,.45);
        max-height: 70vh; overflow-y: auto; z-index: 1200; padding: 6px;
      }
      .search-results .sr-group-title {
        font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
        color: var(--text-muted, #8b97a8); padding: 8px 10px 4px; font-weight: 600;
      }
      .search-results .sr-item {
        display: flex; align-items: center; gap: 10px; padding: 9px 10px;
        border-radius: 8px; cursor: pointer; color: var(--text, #e6edf3);
        text-decoration: none; font-size: 13px;
      }
      .search-results .sr-item:hover, .search-results .sr-item.active { background: rgba(88,166,255,.12); }
      .search-results .sr-item i { width: 18px; text-align: center; color: var(--text-muted, #8b97a8); }
      .search-results .sr-item .sr-main { font-weight: 600; }
      .search-results .sr-item .sr-sub { color: var(--text-muted, #8b97a8); font-size: 12px; margin-left: auto; }
      .search-results .sr-empty { padding: 16px; text-align: center; color: var(--text-muted, #8b97a8); font-size: 13px; }
      .search-results .sr-chip { font-size: 11px; padding: 1px 7px; border-radius: 6px; background: rgba(139,151,168,.18); }
      .search-results .sr-chip.completed { background: rgba(46,204,113,.18); color: #2ecc71; }
      .search-results .sr-chip.pending { background: rgba(241,196,15,.18); color: #f1c40f; }
      .search-results .sr-chip.failed, .search-results .sr-chip.expired { background: rgba(231,76,60,.18); color: #e74c3c; }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="logo"><i class="fas fa-phone-volume"></i></div>
            <div class="brand-text">
                <b>MikoPBX</b>
                <span>Service Platform</span>
            </div>
        </div>

        <div class="nav-section-label">Обзор</div>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i> Дашборд
        </a>
        <a href="/calls" class="nav-link {% if request.path.startswith('/calls') %}active{% endif %}">
            <i class="fas fa-list"></i> Звонки
        </a>

        <div class="nav-section-label">Обратный звонок</div>
        <a href="/callback/tasks" class="nav-link {% if request.path.startswith('/callback/tasks') %}active{% endif %}">
            <i class="fas fa-list-check"></i> Задачи
        </a>
        <a href="/callback" class="nav-link {% if request.path == '/callback' %}active{% endif %}">
            <i class="fas fa-sliders-h"></i> Настройки
        </a>

        <div class="sidebar-footer">
            <a href="#" class="nav-link" onclick="toggleTheme();return false;" id="themeLink">
                <i class="fas fa-moon"></i> <span id="themeLabel">Светлая тема</span>
            </a>
            {% if session.get('authed') %}
            <a href="/logout" class="nav-link" title="Выйти из системы">
                <i class="fas fa-right-from-bracket"></i> Выйти
            </a>
            {% endif %}
        </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
        <button class="icon-btn" id="menuBtn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none" aria-label="Меню"><i class="fas fa-bars"></i></button>
        <div class="topbar-search" id="searchBox">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Поиск по номеру, оператору, задаче…" autocomplete="off">
            <kbd>/</kbd>
            <div class="search-results" id="searchResults" hidden></div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="pbx-status" id="pbxStatus" title="Статус подключения к АТС">
            <span class="pbx-dot"></span> PBX <span id="pbxStatusText">online</span>
        </div>
        <button class="icon-btn" title="Уведомления" onclick="alert('Центр уведомлений скоро будет доступен')">
            <i class="fas fa-bell"></i><span class="dot-badge"></span>
        </button>
        <div class="topbar-user" title="Профиль">
            <div class="avatar">OP</div>
            <span class="u-name">Оператор</span>
            <i class="fas fa-chevron-down" style="font-size:11px;color:var(--text-3)"></i>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        function applyThemeUI() {
            var light = document.body.classList.contains('light-theme');
            var icon = document.querySelector('#themeLink i');
            var label = document.getElementById('themeLabel');
            if (icon) icon.className = light ? 'fas fa-sun' : 'fas fa-moon';
            if (label) label.textContent = light ? 'Тёмная тема' : 'Светлая тема';
        }
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            applyThemeUI();
        }
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        window.addEventListener('DOMContentLoaded', applyThemeUI);

        // responsive menu button
        function syncMenuBtn(){ document.getElementById('menuBtn').style.display = window.innerWidth <= 920 ? 'grid' : 'none'; }
        window.addEventListener('resize', syncMenuBtn); window.addEventListener('DOMContentLoaded', syncMenuBtn);

        // "/" focuses global search
        document.addEventListener('keydown', function(e){
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                e.preventDefault(); var s = document.getElementById('globalSearch'); if (s) s.focus();
            }
        });

        // realtime PBX status indicator
        async function refreshPbxStatus(){
            try {
                var r = await fetch('/health', {cache:'no-store'});
                var ok = r.ok;
                var el = document.getElementById('pbxStatus'), t = document.getElementById('pbxStatusText');
                if (el) el.classList.toggle('offline', !ok);
                if (t) t.textContent = ok ? 'online' : 'offline';
            } catch(e){
                var el = document.getElementById('pbxStatus'), t = document.getElementById('pbxStatusText');
                if (el) el.classList.add('offline'); if (t) t.textContent = 'offline';
            }
        }
        window.addEventListener('DOMContentLoaded', function(){ refreshPbxStatus(); setInterval(refreshPbxStatus, 20000); });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}

    <script>
    (function(){
      var input = document.getElementById('globalSearch');
      var box = document.getElementById('searchResults');
      if (!input || !box) return;
      var timer = null, items = [], active = -1;

      function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
      function close(){ box.hidden = true; box.innerHTML=''; items=[]; active=-1; }

      function render(data){
        var html = '';
        items = [];
        if (data.calls && data.calls.length){
          html += '<div class="sr-group-title">Звонки</div>';
          data.calls.forEach(function(c){
            var num = c.src || c.dst || '';
            var url = '/calls?search=' + encodeURIComponent(num);
            items.push(url);
            html += '<a class="sr-item" href="'+url+'"><i class="fas fa-phone"></i>'+
              '<span class="sr-main">'+esc(c.src||'?')+' → '+esc(c.dst||'?')+'</span>'+
              '<span class="sr-sub">'+esc(c.started_at||'')+'</span></a>';
          });
        }
        if (data.tasks && data.tasks.length){
          html += '<div class="sr-group-title">Задачи</div>';
          data.tasks.forEach(function(t){
            var url = '/callback/tasks?phone=' + encodeURIComponent(t.phone||'');
            items.push(url);
            var st = (t.status||'').toLowerCase();
            html += '<a class="sr-item" href="'+url+'"><i class="fas fa-list-check"></i>'+
              '<span class="sr-main">#'+esc(t.id)+' · '+esc(t.phone||'')+'</span>'+
              '<span class="sr-sub"><span class="sr-chip '+esc(st)+'">'+esc(t.status||'')+'</span></span></a>';
          });
        }
        if (data.operators && data.operators.length){
          html += '<div class="sr-group-title">Операторы</div>';
          data.operators.forEach(function(o){
            var url = '/callback/tasks?operator=' + encodeURIComponent(o.ext||'');
            items.push(url);
            html += '<a class="sr-item" href="'+url+'"><i class="fas fa-headset"></i>'+
              '<span class="sr-main">Оператор '+esc(o.ext)+'</span>'+
              '<span class="sr-sub">'+esc(o.completed||0)+'/'+esc(o.total||0)+' задач</span></a>';
          });
        }
        if (!html){ html = '<div class="sr-empty">Ничего не найдено</div>'; }
        box.innerHTML = html;
        box.hidden = false;
        active = -1;
      }

      function doSearch(){
        var q = input.value.trim();
        if (q.length < 2){ close(); return; }
        fetch('/api/search?q=' + encodeURIComponent(q))
          .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
          .then(render)
          .catch(function(){ close(); });
      }

      input.addEventListener('input', function(){ clearTimeout(timer); timer = setTimeout(doSearch, 220); });
      input.addEventListener('focus', function(){ if (input.value.trim().length>=2) doSearch(); });

      var nodes = function(){ return box.querySelectorAll('.sr-item'); };
      input.addEventListener('keydown', function(e){
        var n = nodes();
        if (e.key === 'ArrowDown'){ e.preventDefault(); active=Math.min(active+1,n.length-1); }
        else if (e.key === 'ArrowUp'){ e.preventDefault(); active=Math.max(active-1,0); }
        else if (e.key === 'Enter'){ if (active>=0 && items[active]){ window.location.href=items[active]; } else { doSearch(); } return; }
        else if (e.key === 'Escape'){ close(); input.blur(); return; }
        else return;
        n.forEach(function(el,i){ el.classList.toggle('active', i===active); });
        if (n[active]) n[active].scrollIntoView({block:'nearest'});
      });

      document.addEventListener('click', function(e){
        if (!document.getElementById('searchBox').contains(e.target)) close();
      });
      document.addEventListener('keydown', function(e){
        if (e.key === '/' && document.activeElement !== input &&
            !/^(INPUT|TEXTAREA|SELECT)$/.test((document.activeElement||{}).tagName||'')){
          e.preventDefault(); input.focus();
        }
      });
    })();
    </script>
</body>
</html>

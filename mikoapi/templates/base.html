<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MikoPBX Service{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="logo"><i class="fas fa-phone-volume"></i></div>
            <div class="brand-text">
                <b>MikoPBX</b>
                <span>Service Platform</span>
            </div>
        </div>

        <div class="nav-section-label">Обзор</div>
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i> Дашборд
        </a>
        <a href="/calls" class="nav-link {% if request.path.startswith('/calls') %}active{% endif %}">
            <i class="fas fa-list"></i> Звонки
        </a>

        <div class="nav-section-label">Обратный звонок</div>
        <a href="/callback/tasks" class="nav-link {% if request.path.startswith('/callback/tasks') %}active{% endif %}">
            <i class="fas fa-list-check"></i> Задачи
        </a>
        <a href="/callback" class="nav-link {% if request.path == '/callback' %}active{% endif %}">
            <i class="fas fa-sliders-h"></i> Настройки
        </a>

        <div class="sidebar-footer">
            <a href="#" class="nav-link" onclick="toggleTheme();return false;" id="themeLink">
                <i class="fas fa-moon"></i> <span id="themeLabel">Светлая тема</span>
            </a>
            {% if session.get('authed') %}
            <a href="/logout" class="nav-link" title="Выйти из системы">
                <i class="fas fa-right-from-bracket"></i> Выйти
            </a>
            {% endif %}
        </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
        <button class="icon-btn" id="menuBtn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none" aria-label="Меню"><i class="fas fa-bars"></i></button>
        <div class="topbar-search">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Поиск по номеру, оператору, задаче…" autocomplete="off">
            <kbd>/</kbd>
        </div>
        <div class="topbar-spacer"></div>
        <div class="pbx-status" id="pbxStatus" title="Статус подключения к АТС">
            <span class="pbx-dot"></span> PBX <span id="pbxStatusText">online</span>
        </div>
        <button class="icon-btn" title="Уведомления" onclick="alert('Центр уведомлений скоро будет доступен')">
            <i class="fas fa-bell"></i><span class="dot-badge"></span>
        </button>
        <div class="topbar-user" title="Профиль">
            <div class="avatar">OP</div>
            <span class="u-name">Оператор</span>
            <i class="fas fa-chevron-down" style="font-size:11px;color:var(--text-3)"></i>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        function applyThemeUI() {
            var light = document.body.classList.contains('light-theme');
            var icon = document.querySelector('#themeLink i');
            var label = document.getElementById('themeLabel');
            if (icon) icon.className = light ? 'fas fa-sun' : 'fas fa-moon';
            if (label) label.textContent = light ? 'Тёмная тема' : 'Светлая тема';
        }
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            applyThemeUI();
        }
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        window.addEventListener('DOMContentLoaded', applyThemeUI);

        // responsive menu button
        function syncMenuBtn(){ document.getElementById('menuBtn').style.display = window.innerWidth <= 920 ? 'grid' : 'none'; }
        window.addEventListener('resize', syncMenuBtn); window.addEventListener('DOMContentLoaded', syncMenuBtn);

        // "/" focuses global search
        document.addEventListener('keydown', function(e){
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                e.preventDefault(); var s = document.getElementById('globalSearch'); if (s) s.focus();
            }
        });

        // realtime PBX status indicator
        async function refreshPbxStatus(){
            try {
                var r = await fetch('/health', {cache:'no-store'});
                var ok = r.ok;
                var el = document.getElementById('pbxStatus'), t = document.getElementById('pbxStatusText');
                if (el) el.classList.toggle('offline', !ok);
                if (t) t.textContent = ok ? 'online' : 'offline';
            } catch(e){
                var el = document.getElementById('pbxStatus'), t = document.getElementById('pbxStatusText');
                if (el) el.classList.add('offline'); if (t) t.textContent = 'offline';
            }
        }
        window.addEventListener('DOMContentLoaded', function(){ refreshPbxStatus(); setInterval(refreshPbxStatus, 20000); });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

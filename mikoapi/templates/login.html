<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | MikoPBX Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            background:#0D1117; color:#E6EDF3; letter-spacing:-0.011em; position:relative; overflow:hidden;
        }
        body::before { content:""; position:fixed; inset:0; pointer-events:none;
            background:
              radial-gradient(800px 500px at 75% -10%, rgba(79,124,255,0.18), transparent 60%),
              radial-gradient(700px 450px at 10% 110%, rgba(139,92,246,0.14), transparent 55%); }
        .login-card {
            position:relative; z-index:1; width:380px; max-width:92vw;
            background:#1C2333; border:1px solid rgba(255,255,255,0.10);
            border-radius:20px; padding:40px 34px;
            box-shadow:0 24px 70px rgba(0,0,0,0.55);
        }
        .login-card::before { content:""; position:absolute; inset:0 0 auto 0; height:1px; border-radius:20px 20px 0 0;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent); }
        .login-brand { text-align:center; margin-bottom:30px; }
        .login-brand .logo { width:56px; height:56px; margin:0 auto 16px; border-radius:16px;
            display:grid; place-items:center; font-size:24px; color:#fff;
            background:linear-gradient(135deg,#4F7CFF,#8B5CF6);
            box-shadow:0 10px 28px rgba(79,124,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
        .login-brand h1 { font-size:20px; font-weight:600; letter-spacing:-0.02em; }
        .login-brand p { font-size:13px; color:#6E7A8A; margin-top:5px; }
        .field { margin-bottom:18px; }
        .field label { display:block; font-size:13px; font-weight:500; color:#9DA7B3; margin-bottom:8px; }
        .field input {
            width:100%; padding:12px 14px; border-radius:12px;
            border:1px solid rgba(255,255,255,0.12); background:#0F141B; color:#E6EDF3;
            font-size:15px; font-family:inherit; outline:none; transition:border-color .18s, box-shadow .18s; }
        .field input:focus { border-color:#4F7CFF; box-shadow:0 0 0 3px rgba(79,124,255,0.25); }
        .btn {
            width:100%; padding:13px; border:none; border-radius:12px; font-family:inherit;
            background:linear-gradient(135deg,#4F7CFF,#6E93FF); color:#fff;
            font-size:15px; font-weight:600; cursor:pointer; transition:transform .18s, box-shadow .18s;
            box-shadow:0 8px 22px rgba(79,124,255,0.4), inset 0 1px 0 rgba(255,255,255,0.18);
            display:inline-flex; align-items:center; justify-content:center; gap:8px; }
        .btn:hover { transform:translateY(-1px); box-shadow:0 12px 30px rgba(79,124,255,0.5), inset 0 1px 0 rgba(255,255,255,0.18); }
        .error { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.4);
            color:#FCA5A5; padding:11px 13px; border-radius:11px; font-size:13px; margin-bottom:18px; text-align:center; }
    </style>
</head>
<body>
    <form class="login-card" method="POST">
        <div class="login-brand">
            <div class="logo"><i class="fas fa-phone-volume"></i></div>
            <h1>MikoPBX Service</h1>
            <p>Вход в панель управления</p>
        </div>
        {% if error %}<div class="error"><i class="fas fa-circle-exclamation"></i> {{ error }}</div>{% endif %}
        <div class="field">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="Введите пароль">
        </div>
        <button type="submit" class="btn"><i class="fas fa-right-to-bracket"></i> Войти</button>
    </form>
</body>
</html>

{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <div class="page-header">
        <h1><i class="fas fa-chart-pie"></i> Дашборд</h1>
        <div class="header-controls">
            <select id="daysSelect" onchange="refreshStats()">
                <option value="1">За 1 день</option>
                <option value="7" selected>За 7 дней</option>
                <option value="14">За 14 дней</option>
                <option value="30">За 30 дней</option>
            </select>
            <button onclick="refreshStats()" class="btn-refresh">
                <i class="fas fa-sync-alt"></i>
                Обновить
            </button>
        </div>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-phone"></i></div>
            <div class="stat-info">
                <span class="stat-label">Всего звонков</span>
                <span class="stat-value" id="totalCalls">-</span>
            </div>
        </div>
        <div class="stat-card voicemail">
            <div class="stat-icon"><i class="fas fa-voicemail"></i></div>
            <div class="stat-info">
                <span class="stat-label">Голосовая почта</span>
                <span class="stat-value" id="totalVoicemail">-</span>
            </div>
        </div>
        <div class="stat-card duration">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <div class="stat-info">
                <span class="stat-label">Общая длительность</span>
                <span class="stat-value" id="totalDuration">-</span>
            </div>
        </div>
        <div class="stat-card percentage">
            <div class="stat-icon"><i class="fas fa-percentage"></i></div>
            <div class="stat-info">
                <span class="stat-label">% голосовой почты</span>
                <span class="stat-value" id="voicemailPercent">-</span>
            </div>
        </div>
    </div>
    
    <div class="charts-grid">
        <div class="chart-card">
            <h3><i class="fas fa-chart-bar"></i> Статистика по дням</h3>
            <div class="chart-container">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-chart-doughnut"></i> Распределение по типам</h3>
            <div class="chart-container">
                <canvas id="typeChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="recent-calls">
        <div class="section-header">
            <h3><i class="fas fa-clock"></i> Последние звонки</h3>
            <a href="/calls" class="view-all">Все звонки →</a>
        </div>
        <div id="recentCalls">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</div>

<script>
let dailyChart = null;
let typeChart = null;

async function refreshStats() {
    const days = document.getElementById('daysSelect').value;
    
    try {
        const response = await fetch(`/api/stats?days=${days}`);
        const data = await response.json();
        updateStats(data);
        updateCharts(data);
        updateRecentCalls();
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

function updateStats(data) {
    const total = data.total;
    document.getElementById('totalCalls').textContent = total.calls || 0;
    document.getElementById('totalVoicemail').textContent = total.voicemail || 0;
    
    // Форматируем длительность
    const duration = total.duration || 0;
    document.getElementById('totalDuration').textContent = formatDuration(duration);
    
    // Процент
    const percent = total.calls > 0 ? (total.voicemail / total.calls * 100) : 0;
    document.getElementById('voicemailPercent').textContent = percent.toFixed(1) + '%';
}

function updateCharts(data) {
    // График по дням
    const dailyData = data.daily || [];
    const labels = dailyData.map(d => d.date).reverse();
    const totals = dailyData.map(d => d.total).reverse();
    const voicemails = dailyData.map(d => d.voicemail).reverse();
    
    if (dailyChart) {
        dailyChart.destroy();
    }
    
    const ctx = document.getElementById('dailyChart').getContext('2d');
    dailyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Всего звонков',
                    data: totals,
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 2
                },
                {
                    label: 'Голосовая почта',
                    data: voicemails,
                    backgroundColor: 'rgba(255, 99, 132, 0.5)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 2
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    }
                }
            }
        }
    });
    
    // Круговая диаграмма
    const typeData = data.by_type || {};
    const labels2 = Object.keys(typeData);
    const values2 = labels2.map(k => typeData[k].total);
    const colors = ['#ff6b6b', '#4dabf7'];
    const labelMap = {
        'no_answer': 'Пропущенные',
        'voicemail': 'Голосовая почта'
    };
    
    if (typeChart) {
        typeChart.destroy();
    }
    
    const ctx2 = document.getElementById('typeChart').getContext('2d');
    typeChart = new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: labels2.map(k => labelMap[k] || k),
            datasets: [{
                data: values2,
                backgroundColor: colors,
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
}

async function updateRecentCalls() {
    try {
        const response = await fetch('/api/calls?limit=5');
        const data = await response.json();
        const container = document.getElementById('recentCalls');
        
        if (data.calls.length === 0) {
            container.innerHTML = '<div class="no-data">Нет звонков</div>';
            return;
        }
        
        container.innerHTML = data.calls.map(call => `
            <div class="call-item">
                <div class="call-info">
                    <span class="call-number">${call.src_num || 'N/A'} → ${call.dst_num || 'N/A'}</span>
                    <span class="call-time">${formatTime(call.start_time)}</span>
                </div>
                <div class="call-meta">
                    <span class="call-type ${call.call_type}">
                        ${call.call_type === 'voicemail' ? '📨' : '❌'} 
                        ${call.call_type === 'voicemail' ? 'Голосовая' : 'Пропущенный'}
                    </span>
                    <span class="call-duration">${call.total_duration || 0}с</span>
                </div>
            </div>
        `).join('');
        
    } catch (error) {
        console.error('Error loading recent calls:', error);
    }
}

function formatDuration(seconds) {
    if (seconds < 60) return seconds + 'с';
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${minutes}м ${secs}с`;
}

function formatTime(timeStr) {
    if (!timeStr) return 'N/A';
    try {
        const dt = new Date(timeStr);
        return dt.toLocaleString('ru-RU', {
            day: '2-digit',
            month: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    } catch {
        return timeStr;
    }
}

// Инициализация
refreshStats();
// Автообновление каждые 60 секунд
setInterval(refreshStats, 60000);
</script>
{% endblock %}
